name: Stage Alias

on:
  deployment_status:

jobs:
  alias-stage-domain:
    if: >
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.ref != '' &&
      startsWith(github.event.deployment.ref, 'stage/') &&
      github.event.deployment_status.target_url != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Repoint stage.partyswami.com
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_SCOPE: xponetials-projects
          STAGE_BRANCH: ${{ github.event.deployment.ref }}
          STAGE_SOURCE_ALIAS: ${{ github.event.deployment_status.target_url }}
          STAGE_DOMAIN: stage.partyswami.com
        run: node scripts/stage-alias.mjs

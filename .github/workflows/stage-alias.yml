name: Stage Alias

on:
  deployment_status:

jobs:
  alias-stage-domain:
    if: >
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.target_url != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Detect stage branch deployment
        id: detect_stage
        env:
          DEPLOY_REF: ${{ github.event.deployment.ref }}
        run: |
          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*'

          # Only proceed if the deployment is from a stage/* branch
          if [[ ! "$DEPLOY_REF" =~ ^stage/ ]]; then
            echo "is_stage=false" >> "$GITHUB_OUTPUT"
            echo "Deployment ref '$DEPLOY_REF' is not a stage/* branch. Skipping."
            exit 0
          fi

          # Find the highest-numbered stage/phase-* branch so old phases
          # don't reclaim the domain after a new phase is deployed.
          LATEST_STAGE=$(git branch -r | grep -Eo 'origin/stage/phase-[0-9]+' | sort -t'-' -k3 -n | tail -1 | sed 's|origin/||')

          if [[ "$DEPLOY_REF" == "$LATEST_STAGE" ]]; then
            echo "is_stage=true" >> "$GITHUB_OUTPUT"
            echo "STAGE_BRANCH=$DEPLOY_REF" >> "$GITHUB_ENV"
            echo "Deployment from latest stage branch '$DEPLOY_REF'. Running alias."
          else
            echo "is_stage=false" >> "$GITHUB_OUTPUT"
            echo "Deployment from '$DEPLOY_REF' but latest stage is '$LATEST_STAGE'. Skipping."
          fi

      - name: Repoint stage.partyswami.com
        if: steps.detect_stage.outputs.is_stage == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_SCOPE: xponetials-projects
          STAGE_SOURCE_ALIAS: ${{ github.event.deployment_status.target_url }}
          STAGE_DOMAIN: stage.partyswami.com
        run: node scripts/stage-alias.mjs

name: Stage Alias

on:
  deployment_status:

jobs:
  alias-stage-domain:
    if: >
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.target_url != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Detect stage branch deployment
        id: detect_stage
        env:
          DEPLOY_SHA: ${{ github.event.deployment.ref }}
        run: |
          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*'
          if git branch -r --contains "$DEPLOY_SHA" | grep -Eq 'origin/stage/'; then
            echo "is_stage=true" >> "$GITHUB_OUTPUT"
            echo "Detected stage branch for commit $DEPLOY_SHA"
          else
            echo "is_stage=false" >> "$GITHUB_OUTPUT"
            echo "Commit $DEPLOY_SHA is not on a stage/* branch. Skipping alias."
          fi

      - name: Repoint stage.partyswami.com
        if: steps.detect_stage.outputs.is_stage == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_SCOPE: xponetials-projects
          STAGE_SOURCE_ALIAS: ${{ github.event.deployment_status.target_url }}
          STAGE_DOMAIN: stage.partyswami.com
        run: node scripts/stage-alias.mjs

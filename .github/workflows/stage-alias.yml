name: Stage Alias

on:
  push:
    branches:
      - "stage/**"

jobs:
  alias-stage-domain:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Repoint stage.partyswami.com
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_SCOPE: xponetials-projects
          STAGE_BRANCH: ${{ github.ref_name }}
          STAGE_DOMAIN: stage.partyswami.com
        run: node scripts/stage-alias.mjs

name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://ltwdwwuzjpvrdtvbdiek.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_r8kn4L6E3eSMK9sgdaCv5Q_HX8sW0PH
      DEBUG: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run end-to-end smoke tests
        run: npm run test:e2e
